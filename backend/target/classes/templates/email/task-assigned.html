<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"><title>New Task Assigned</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;margin:0;padding:0;background:#f5f5f5;}
  .container{max-width:600px;margin:32px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .header{background:#166534;padding:32px;text-align:center;}
  .header h1{color:#fff;margin:0;font-size:22px;}
  .body{padding:32px;}
  .field{margin:8px 0;font-size:14px;color:#555;}
  .field strong{color:#333;display:inline-block;width:120px;}
  .footer{background:#f8fafc;padding:20px;text-align:center;border-top:1px solid #e2e8f0;font-size:12px;color:#999;}
</style></head>
<body>
<div class="container">
  <div class="header"><h1>New Task Assigned</h1></div>
  <div class="body">
    <p>Hello <strong th:text="${employeeName}"></strong>,</p>
    <p style="color:#555;font-size:14px;">A new task has been assigned to you by <strong th:text="${assignedBy}"></strong>.</p>
    <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:20px;margin:16px 0;">
      <div style="font-size:18px;font-weight:600;color:#166534;margin-bottom:12px;" th:text="${taskTitle}"></div>
      <div class="field"><strong>Description:</strong><span th:text="${taskDescription ?: 'N/A'}"></span></div>
      <div class="field"><strong>Priority:</strong><span th:text="${priority}"></span></div>
      <div class="field"><strong>Due Date:</strong><span th:text="${dueDate}"></span></div>
    </div>
  </div>
  <div class="footer"><p>LG Employee Reminder System</p></div>
</div>
</body></html>
