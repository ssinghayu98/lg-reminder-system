<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"><title>Escalation Alert</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;margin:0;padding:0;background:#f5f5f5;}
  .container{max-width:600px;margin:32px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .header{background:#991b1b;padding:32px;text-align:center;}
  .header h1{color:#fff;margin:0;font-size:22px;}
  .body{padding:32px;}
  .alert-badge{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:12px 20px;color:#991b1b;font-weight:600;text-align:center;margin-bottom:20px;}
  .field{margin:8px 0;font-size:14px;color:#555;}
  .field strong{color:#333;display:inline-block;width:140px;}
  .footer{background:#f8fafc;padding:20px;text-align:center;border-top:1px solid #e2e8f0;font-size:12px;color:#999;}
</style></head>
<body>
<div class="container">
  <div class="header"><h1>⚠ Escalation Alert</h1></div>
  <div class="body">
    <div class="alert-badge">Task Overdue by <span th:text="${overdueDays}"></span> day(s)</div>
    <p>Hello <strong th:text="${managerName}"></strong>,</p>
    <p style="color:#555;font-size:14px;">The following task assigned to your team is overdue and requires your attention.</p>
    <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:20px;margin:16px 0;">
      <div class="field"><strong>Task:</strong><span th:text="${taskTitle}"></span></div>
      <div class="field"><strong>Assigned To:</strong><span th:text="${employeeName}"></span></div>
      <div class="field"><strong>Original Due Date:</strong><span th:text="${dueDate}"></span></div>
      <div class="field"><strong>Overdue By:</strong><span th:text="${overdueDays} + ' days'"></span></div>
    </div>
  </div>
  <div class="footer"><p>LG Employee Reminder System – Automated Escalation</p></div>
</div>
</body></html>
