<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"><title>Verify Email</title></head>
<body style="font-family:Arial,sans-serif;background:#f5f5f5;padding:32px;">
<div style="max-width:600px;margin:0 auto;background:#fff;border-radius:12px;padding:32px;">
  <h2 style="color:#1e3a5f;">Verify your email address</h2>
  <p>Hello <strong th:text="${name}"></strong>,</p>
  <p>Click the button below to verify your email address and activate your account.</p>
  <a th:href="${verificationLink}" style="display:inline-block;background:#1e3a5f;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;margin:16px 0;">Verify Email</a>
  <p style="font-size:12px;color:#999;">This link expires in 24 hours. If you did not create this account, ignore this email.</p>
</div>
</body></html>
