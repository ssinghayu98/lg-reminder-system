<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"><title>Reset Password</title></head>
<body style="font-family:Arial,sans-serif;background:#f5f5f5;padding:32px;">
<div style="max-width:600px;margin:0 auto;background:#fff;border-radius:12px;padding:32px;">
  <h2 style="color:#1e3a5f;">Reset your password</h2>
  <p>Hello <strong th:text="${name}"></strong>,</p>
  <p>We received a request to reset your password. Click below to set a new one.</p>
  <a th:href="${resetLink}" style="display:inline-block;background:#1e3a5f;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;margin:16px 0;">Reset Password</a>
  <p style="font-size:12px;color:#999;">This link expires in 1 hour. If you did not request this, ignore this email.</p>
</div>
</body></html>
