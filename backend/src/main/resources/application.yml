spring:
  main:
    lazy-initialization: true
  application:
    name: lg-employee-reminder
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lg_reminder?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:lguser}
    password: ${DB_PASSWORD:lgpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH:604800000}

  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

  gmail:
    client-id: ${GMAIL_CLIENT_ID}
    client-secret: ${GMAIL_CLIENT_SECRET}
    refresh-token: ${GMAIL_REFRESH_TOKEN}
    sender-email: ${GMAIL_SENDER_EMAIL}

  file:
    upload-dir: ${UPLOAD_DIR:./uploads}

  reminder:
    scheduler-enabled: ${SCHEDULER_ENABLED:true}
    cron: "0 0 8 * * *"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.lg.reminder: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN